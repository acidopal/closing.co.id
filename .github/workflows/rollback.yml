name: Rollback Scalebiz (Helm via SSH)

on:
  workflow_dispatch:
    inputs:
      revision:
        description: Helm revision number to rollback to
        required: true
      namespace:
        description: Kubernetes namespace
        required: false
        default: scalebiz
      release:
        description: Helm release name
        required: false
        default: scalebiz

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: Ensure SSH secrets exist
        run: |
          test -n "${{ secrets.SSH_HOST }}" || (echo "Missing secret SSH_HOST" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "Missing secret SSH_USER" && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" || (echo "Missing secret SSH_PRIVATE_KEY" && exit 1)

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rollback release on server
        env:
          SSH_SUDO_PASSWORD: ${{ secrets.SSH_SUDO_PASSWORD }}
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "REVISION='${{ inputs.revision }}' NAMESPACE='${{ inputs.namespace }}' RELEASE='${{ inputs.release }}' SSH_SUDO_PASSWORD='${SSH_SUDO_PASSWORD}' bash -s" <<'REMOTE'
          set -euo pipefail

          run_sudo() {
            if sudo -n true 2>/dev/null; then
              sudo "$@"
              return
            fi

            if [ -n "${SSH_SUDO_PASSWORD:-}" ]; then
              printf '%s\n' "$SSH_SUDO_PASSWORD" | sudo -S "$@"
              return
            fi

            echo "Passwordless sudo unavailable and SSH_SUDO_PASSWORD is not set"
            exit 1
          }

          run_sudo env KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm -n "${NAMESPACE}" rollback "${RELEASE}" "${REVISION}"
          run_sudo env KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl -n "${NAMESPACE}" rollout status deployment/"${RELEASE}"-api --timeout=300s
          run_sudo env KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl -n "${NAMESPACE}" rollout status deployment/"${RELEASE}"-frontend --timeout=300s
          run_sudo env KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl -n "${NAMESPACE}" rollout status deployment/"${RELEASE}"-worker --timeout=300s
          run_sudo env KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl -n "${NAMESPACE}" rollout status deployment/"${RELEASE}"-scheduler --timeout=300s
          REMOTE
