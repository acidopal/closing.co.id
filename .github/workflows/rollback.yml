name: Rollback closing.co.id

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, tag, or commit SHA to deploy
        required: true

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: Ensure SSH secrets exist
        run: |
          test -n "${{ secrets.SSH_HOST }}" || (echo "Missing secret SSH_HOST" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "Missing secret SSH_USER" && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" || (echo "Missing secret SSH_PRIVATE_KEY" && exit 1)

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy requested ref
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "APP_DIR='/opt/closing.co.id' DEPLOY_REF='${{ inputs.ref }}' IMAGE_TAG='rollback-${{ github.run_id }}' bash /opt/closing.co.id/deploy/scripts/vps-docker-deploy.sh"
