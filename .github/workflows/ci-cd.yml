name: Deploy closing.co.id

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: closing-production
  cancel-in-progress: false

env:
  API_HOST: api.closing.co.id
  APP_HOST: app.closing.co.id
  FRONTEND_ORIGIN: https://app.closing.co.id
  VITE_API_URL: https://api.closing.co.id
  VITE_SOCKET_URL: https://api.closing.co.id

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: bun run --filter backend db:generate

      - name: Build backend
        run: bun run build:backend

      - name: Build frontend
        run: bun run build:frontend

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: Ensure SSH secrets exist
        run: |
          test -n "${{ secrets.SSH_HOST }}" || (echo "Missing secret SSH_HOST" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "Missing secret SSH_USER" && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" || (echo "Missing secret SSH_PRIVATE_KEY" && exit 1)

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "APP_DIR='/opt/closing.co.id' DEPLOY_REF='${{ github.sha }}' IMAGE_TAG='${{ github.sha }}' bash /opt/closing.co.id/deploy/scripts/vps-docker-deploy.sh"

      - name: Post-deploy smoke checks
        run: |
          set -euo pipefail
          curl -fsS --retry 8 --retry-delay 3 --retry-connrefused "https://${API_HOST}/health" >/dev/null
          curl -fsSL --retry 8 --retry-delay 3 --retry-connrefused "https://${APP_HOST}/login" >/dev/null

          node <<'NODE'
          const crypto = require("node:crypto");
          const https = require("node:https");

          const host = process.env.API_HOST;
          const origin = process.env.FRONTEND_ORIGIN;
          const socketPath = "/socket.io/?EIO=4&transport=websocket";
          const key = crypto.randomBytes(16).toString("base64");
          const expectedAccept = crypto
            .createHash("sha1")
            .update(`${key}258EAFA5-E914-47DA-95CA-C5AB0DC85B11`)
            .digest("base64");

          const req = https.request({
            host,
            port: 443,
            method: "GET",
            path: socketPath,
            headers: {
              Connection: "Upgrade",
              Upgrade: "websocket",
              "Sec-WebSocket-Key": key,
              "Sec-WebSocket-Version": "13",
              Origin: origin,
            },
            timeout: 10000,
          });

          req.on("upgrade", (res, socket) => {
            const accept = res.headers["sec-websocket-accept"];
            if (res.statusCode !== 101 || accept !== expectedAccept) {
              console.error(`Unexpected websocket handshake: status=${res.statusCode}, accept=${accept}`);
              socket.destroy();
              process.exit(1);
            }
            socket.destroy();
            console.log("Socket.IO websocket handshake OK");
            process.exit(0);
          });

          req.on("response", (res) => {
            console.error(`Expected HTTP 101 upgrade, received ${res.statusCode}`);
            process.exit(1);
          });

          req.on("timeout", () => {
            req.destroy(new Error("websocket handshake timeout"));
          });

          req.on("error", (error) => {
            console.error(`Websocket smoke check failed: ${error.message}`);
            process.exit(1);
          });

          req.end();
          NODE
